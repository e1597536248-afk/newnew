<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生資料輸入系統</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            margin-top: 0;
            color: #333;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        #message {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>學生姓名輸入</h2>
    <form id="studentForm">
        <div class="form-group">
            <label for="studentName">學生姓名</label>
            <input type="text" id="studentName" placeholder="請輸入姓名" required>
        </div>
        <button type="submit" id="submitBtn">送出資料</button>
    </form>
    <div id="message"></div>
</div>

<script>
    // 這裡替換成你的 Google Apps Script 網頁應用程式 URL
    var scriptURL = "https://script.google.com/macros/s/AKfycbxNj7boSRi9vYTYlTWJNgG1SsEAMeXlasOtveP_ezT96-o9mGg4zG8ENZ_a-G9L7Dnz/exec";

    document.getElementById('studentForm').addEventListener('submit', function(e) {
        e.preventDefault(); // 防止表單預設跳頁

        var nameInput = document.getElementById('studentName');
        var submitBtn = document.getElementById('submitBtn');
        var messageDiv = document.getElementById('message');
        
        var name = nameInput.value.trim();
        if (!name) return;

        // 鎖定按鈕，防止重複點擊
        submitBtn.disabled = true;
        messageDiv.style.color = '#333';
        messageDiv.innerText = "資料傳送中...";

        // 使用 fetch API 發送 POST 請求
        fetch(scriptURL, {
            method: 'POST',
            mode: 'cors', // 確保跨網域傳輸正常
            headers: {
                'Content-Type': 'text/plain;charset=utf-8' // Apps Script 接收 JSON 推薦用 text/plain 避開 preflight
            },
            body: JSON.stringify({ studentName: name })
        })
        .then(response => response.json())
        .then(data => {
            if (data.result === 'success') {
                messageDiv.style.color = 'green';
                messageDiv.innerText = "資料儲存成功！";
                nameInput.value = ''; // 清空輸入框
            } else {
                messageDiv.style.color = 'red';
                messageDiv.innerText = "儲存失敗：" + data.error;
            }
        })
        .catch(error => {
            messageDiv.style.color = 'red';
            messageDiv.innerText = "連線發生錯誤，請稍後再試。";
            console.error('Error!', error.message);
        })
        .finally(() => {
            submitBtn.disabled = false; // 解鎖按鈕
        });
    });
</script>

</body>
</html>
